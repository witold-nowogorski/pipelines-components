---
name: 'Setup Python CI'
description: 'Sets up Python and uv package manager with dependencies'

inputs:
  python-version:
    description: 'Python version to use'
    required: true
  extra:
    description: 'uv extra group to install (defaults to test)'
    required: false
    default: test

runs:
  using: 'composite'
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0

    - name: Display versions
      shell: bash
      run: |
        uv --version
        echo "Python version: $(python --version)"

    - name: Install dependencies from lock file
      shell: bash
      run: uv sync --extra ${{ inputs.extra }}
